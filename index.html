<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bite Boulevard | Home</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#994127", background: "#faf9f6", "on-surface": "#1a1c1a" },
                    fontFamily: { 'headline': ['Libre Caslon Text'], 'body': ['DM Sans'] }
                }
            }
        }
    </script>
</head>
<body class="bg-[#faf9f6] text-[#1a1c1a] font-['DM_Sans'] antialiased">
    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-[#994127]">restaurant_menu</span>
                <span class="font-['Libre_Caslon_Text'] text-2xl">Bite Boulevard</span>
            </div>
            <nav class="hidden md:flex gap-8">
                <a href="index.html" class="text-[#994127] font-bold">Home</a>
                <a href="menu.html" class="hover:text-[#994127]">Menu</a>
                <a href="contact.html" class="hover:text-[#994127]">Location</a>
            </nav>
            <a href="book.html" class="bg-[#994127] text-white px-6 py-3 rounded-xl hidden md:block">Book a Table</a>
        </div>
    </header>

    <main class="pt-20">
        <section class="relative h-[80vh] flex items-center justify-center text-center px-6">
            <div class="absolute inset-0 z-0">
                <img src="https://images.unsplash.com/photo-1550507992-eb63cef301e9?auto=format&fit=crop&w=1200&q=80" class="w-full h-full object-cover opacity-30">
            </div>
            <div class="relative z-10 max-w-3xl">
                <h1 class="font-['Libre_Caslon_Text'] text-5xl md:text-7xl mb-6">A Symphony of Flavor</h1>
                <p class="text-lg mb-8">Experience effortless elegance and culinary sophistication.</p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="menu.html" class="bg-[#994127] text-white px-8 py-4 rounded-xl shadow-lg">View Menu</a>
                    <a href="book.html" class="bg-white border border-gray-300 px-8 py-4 rounded-xl">Book a Table</a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>

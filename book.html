<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Reserve - Bite Boulevard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text&family=DM+Sans&display=swap" rel="stylesheet"/>
</head>
<body class="bg-[#faf9f6] min-h-screen flex items-center justify-center p-6">
    <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-12 bg-white rounded-[32px] overflow-hidden shadow-2xl">
        <!-- Form -->
        <div class="lg:col-span-7 p-8 md:p-16">
            <a href="index.html" class="text-[#994127] mb-8 block">← Return Home</a>
            <h1 class="text-4xl font-['Libre_Caslon_Text'] mb-4">Reserve Your Table</h1>
            <p class="text-gray-500 mb-8">Join us for an unforgettable dining experience.</p>
            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase font-bold text-gray-400 mb-2">Date</label>
                        <input type="date" class="w-full border-0 border-b-2 border-gray-100 focus:ring-0 focus:border-[#994127] py-3">
                    </div>
                    <div>
                        <label class="block text-xs uppercase font-bold text-gray-400 mb-2">Time</label>
                        <select class="w-full border-0 border-b-2 border-gray-100 focus:ring-0 focus:border-[#994127] py-3">
                            <option>5:00 PM</option><option>7:00 PM</option><option>9:00 PM</option>
                        </select>
                    </div>
                </div>
                <button type="button" class="w-full bg-[#994127] text-white py-5 rounded-2xl font-bold text-lg hover:bg-[#80351e] transition-all">Confirm Reservation</button>
            </form>
        </div>
        <!-- Atmosphere Image -->
        <div class="lg:col-span-5 hidden lg:block relative">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBU7suOdmyCCY2kw4RtFqkNEh11b1SNH9eAGjgmchIfpwWY2vRiGPdI95DmtyslkAdILP03womJ_2WLATfSnvFhWQ1WaF71lz_1m7Llv2lfuhu3MG0h3K5FDsqAuc7MSPtprOvKEd1qBBasko2wdv04N_NySO26Tp4OXdNxYO6NxXsgm_GOqCbplt_rPk52UGL_SZoM9Pf8RRRWld40RqVZtrDCdKn80KuZf45m2hi1etNjPQcYC4lU" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/20 flex items-end p-12 text-white">
                <p class="text-2xl italic">"An effortless elegance."</p>
            </div>
        </div>
    </div>
</body>
</html>
